name: NeuroStride CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Python 3.11
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for syntax errors
        run: python -m py_compile main.py agents/agents.py core/database.py models/db_models.py routers/pharmacy.py

      - name: Verify FastAPI app imports cleanly
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci-test-secret-key
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'dummy-for-ci' }}
          LANGFUSE_SECRET_KEY: dummy
          LANGFUSE_PUBLIC_KEY: dummy
          LANGFUSE_BASE_URL: https://cloud.langfuse.com
        run: python -c "from main import app; print('✓ FastAPI app loaded successfully')"

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — Node.js 20
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build (type check + compilation)
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build
